name: Auto Format All Files

on:
  push:
    branches:
      - '**'

jobs:
  auto-format:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Required to push normal files back to GitHub
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- SECTION 1: FIX PYTHON FILES ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install and Run Black (Python Formatter)
        run: |
          python -m pip install --upgrade pip
          pip install black
          black .

      # --- SECTION 3: PUSH ALL FIXES ---
      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'style: auto-reformat all files with issues'
