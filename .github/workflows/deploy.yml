name: Auto Format Python Indentation

on:
  push:
    branches: [ "main" ]

jobs:
  auto-format:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push the reformatted code back to GitHub
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Black Formatter
        run: |
          python -m pip install --upgrade pip
          pip install black

      - name: Reformat Files
        run: |
          black .

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'style: auto-reformat Python indentation'
