name: Auto Format All Files

on:
  push:
    branches:
      - '**'

jobs:
  auto-format:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Required to push normal files back to GitHub
      workflows: write  # FIX: Grants permission to update workflow files if they are touched
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- SECTION 1: FIX PYTHON FILES ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install and Run Black (Python Formatter)
        run: |
          python -m pip install --upgrade pip
          pip install black
          black .

      # --- SECTION 2: FIX OTHER FILES (HTML, JS, JSON, MD, etc.) ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Run Prettier
        run: |
          npm install -g prettier
          # FIX: Explicitly added --ignore-path to skip formatting workflow files
          prettier --write "**/*.{js,ts,json,md,html,css,yml,yaml}" --ignore-path .gitignore --ignore-path .github || true

      # --- SECTION 3: PUSH ALL FIXES ---
      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'style: auto-reformat all files with issues'
